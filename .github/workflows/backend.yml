name: Deploy to cPanel
on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive
        working-directory: ./backend
        run: |
          tar -czf ../deployment.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env.example' \
            --exclude='phpunit.xml' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='vendor' \
            --exclude='composer.lock' \
            .

      - name: Deploy to cPanel via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.CPANEL_HOST }}
          username: ${{ vars.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ vars.CPANEL_SSH_PORT }}
          source: "deployment.tar.gz"
          target: "/home/futuwgbp/temp/"

      - name: Extract and setup on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.CPANEL_HOST }}
          username: ${{ vars.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ vars.CPANEL_SSH_PORT }}
          script: |
            # Create temp directory if it doesn't exist
            mkdir -p /home/futuwgbp/temp

            cd /home/futuwgbp/api.gameverse.lk

            # Backup current deployment (keep last 5 backups)
            if [ -d "storage" ]; then
              BACKUP_FILE="/home/futuwgbp/temp/backup-$(date +%Y%m%d-%H%M%S).tar.gz"
              tar -czf "$BACKUP_FILE" \
                --exclude='storage/logs/*' \
                --exclude='storage/framework/cache/*' \
                --exclude='storage/framework/sessions/*' \
                --exclude='storage/framework/views/*' \
                --exclude='vendor' \
                .
              
              # Keep only last 5 backups
              ls -t /home/futuwgbp/temp/backup-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm
              
              echo "Backup created: $BACKUP_FILE"
            fi

            # Preserve .env file
            if [ -f ".env" ]; then
              cp .env /home/futuwgbp/temp/.env.backup
              echo ".env file backed up"
            fi

            # Extract new deployment
            tar -xzf /home/futuwgbp/temp/deployment.tar.gz -C /home/futuwgbp/api.gameverse.lk

            # Restore .env file
            if [ -f "/home/futuwgbp/temp/.env.backup" ]; then
              cp /home/futuwgbp/temp/.env.backup .env
              rm /home/futuwgbp/temp/.env.backup
              echo ".env file restored"
            fi

            # Remove deployment archive
            rm /home/futuwgbp/temp/deployment.tar.gz

            # Create required storage directories
            mkdir -p storage/framework/views
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/cache/data
            mkdir -p storage/logs
            mkdir -p storage/app/public
            mkdir -p bootstrap/cache

            # Set correct permissions
            chmod -R 775 storage
            chmod -R 775 bootstrap/cache

            # Set ownership
            chown -R futuwgbp:futuwgbp storage
            chown -R futuwgbp:futuwgbp bootstrap/cache

            # Install composer dependencies on server
            echo "Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            # Clear all caches
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear

            # Cache configuration for production
            php artisan config:cache
            php artisan route:cache

            # Run migrations
            php artisan migrate --force

            echo "Deployment completed successfully!"
            echo "Site: https://api.gameverse.lk"
