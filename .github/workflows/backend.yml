name: Deploy to cPanel
on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, json, bcmath, pdo, mysql
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        working-directory: ./backend
        run: |
          # Temporarily remove scripts section from composer.json
          cp composer.json composer.json.backup

          # Remove post-autoload-dump scripts using sed
          sed -i '/"post-autoload-dump":/,/\],/d' composer.json

          # Remove problematic dev packages
          composer remove laravel/pail --dev --no-update --no-scripts || true

          # Install without scripts
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-scripts

          # Generate classmap authoritative autoloader (ignores PSR-4 warnings)
          composer dump-autoload --optimize --no-dev --classmap-authoritative

          # Restore original composer.json for deployment
          mv composer.json.backup composer.json

      - name: Create deployment archive
        working-directory: ./backend
        run: |
          tar -czf ../deployment.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='phpunit.xml' \
            --exclude='composer.json.backup' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            .

      - name: Deploy to cPanel via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.CPANEL_HOST }}
          username: ${{ vars.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ vars.CPANEL_SSH_PORT }}
          source: "deployment.tar.gz"
          target: "/home/futuwgbp/temp/"

      - name: Extract and setup on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.CPANEL_HOST }}
          username: ${{ vars.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: ${{ vars.CPANEL_SSH_PORT }}
          script: |
            # Create temp directory if it doesn't exist
            mkdir -p /home/futuwgbp/temp

            cd /home/futuwgbp/api.gameverse.lk

            # Backup current deployment (keep last 5 backups)
            if [ -d "storage" ]; then
              tar -czf /home/futuwgbp/temp/backup-$(date +%Y%m%d-%H%M%S).tar.gz \
                --exclude='storage/logs/*' \
                --exclude='storage/framework/cache/*' \
                --exclude='storage/framework/sessions/*' \
                --exclude='storage/framework/views/*' \
                .
              ls -t /home/futuwgbp/temp/backup-*.tar.gz | tail -n +6 | xargs -r rm
            fi

            # Extract new deployment
            tar -xzf /home/futuwgbp/temp/deployment.tar.gz -C /home/futuwgbp/api.gameverse.lk

            # Remove archive
            rm /home/futuwgbp/temp/deployment.tar.gz

            # Set permissions (775 for directories, 664 for files)
            find storage -type d -exec chmod 775 {} \;
            find storage -type f -exec chmod 664 {} \;
            find bootstrap/cache -type d -exec chmod 775 {} \;
            find bootstrap/cache -type f -exec chmod 664 {} \;

            # Regenerate optimized autoloader on server (ignore PSR-4 warnings)
            composer dump-autoload --optimize --no-dev --classmap-authoritative 2>&1 | grep -v "does not comply with psr-4" || true

            # Clear caches (suppress errors from missing providers)
            php artisan config:clear 2>/dev/null || echo "Config clear skipped"
            php artisan cache:clear 2>/dev/null || echo "Cache clear skipped"
            php artisan route:clear 2>/dev/null || echo "Route clear skipped"
            php artisan view:clear 2>/dev/null || echo "View clear skipped"

            # Optimize for production (suppress errors)
            php artisan config:cache 2>/dev/null || echo "Config cache skipped"
            php artisan route:cache 2>/dev/null || echo "Route cache skipped"
            php artisan view:cache 2>/dev/null || echo "View cache skipped"

            # Run migrations (uncomment if needed)
            # php artisan migrate --force

            echo "Deployment completed successfully!"
